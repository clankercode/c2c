# #407 e2e multi-agent topology.
#
# Target: two "hosts" (independent broker volumes) + relay + 4 agent
# containers. Cross-host messaging exercises the real relay path,
# unlike docker-compose.two-container.yml which shares one broker.
#
# Self-contained — does NOT require `docker-compose.test.yml` as a
# base overlay.
#
# Usage:
#   DOCKER_BUILDKIT=1 docker compose \
#     -f docker-compose.e2e-multi-agent.yml \
#     up -d --build
#   bash tests/e2e/00-smoke-cross-container.sh
#   docker compose -f docker-compose.e2e-multi-agent.yml down -v
#
# Two broker volumes (broker-a, broker-b) — agents on host-A only see
# host-A peers in `c2c list`. Cross-host delivery MUST go via the relay.
#
# Resource budget (per #330 probe scope): thin shell-driven agents,
# NO MCP, NO LLM, total RAM ≤600MB. Relay 128MB + 4 agents @ 96MB
# = 512MB cap; reservations sized for idle-sleep workloads.
#
# Healthcheck note: the relay runtime image (Dockerfile, debian:12-slim)
# does NOT include curl or wget. `c2c relay status --relay-url http://...`
# was tried but currently fails with "resolution failed: unknown scheme"
# even against a known-healthy local relay (the binary's HTTP-scheme
# resolver is not registered along the c2c-relay-status path; tracked
# separately — flag a finding if not already filed). Fall back to a
# bash `/dev/tcp` probe that the image already supports without bloating
# production layers; it validates the `/health` payload semantically by
# grepping `"ok":true` from the HTTP response.

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: c2c-relay:e2e
    container_name: c2c-e2e-relay
    environment:
      C2C_RELAY_PERSIST_DIR: /var/lib/c2c
      PORT: "7331"
    networks:
      - c2c-e2e-net
    deploy:
      resources:
        limits:
          memory: 128m
          pids: 64
        reservations:
          memory: 32m
    healthcheck:
      # bash /dev/tcp builtin — present in debian:12-slim by default.
      # Sends a literal HTTP GET on /health and asserts the response
      # body contains `"ok":true`. Validates payload semantics, not
      # just TCP liveness. See compose-file header for why we do not
      # use `c2c relay status` here.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/7331 && printf "GET /health HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && timeout 2 cat <&3 | grep -q "\"ok\":true"'
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  agent-a1:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: c2c-e2e-agent:latest
    container_name: c2c-e2e-agent-a1
    depends_on:
      relay:
        condition: service_healthy
    volumes:
      - broker-a:/var/lib/c2c
    networks:
      - c2c-e2e-net
    deploy:
      resources:
        limits:
          memory: 96m
          pids: 64
        reservations:
          memory: 32m
    environment:
      C2C_MCP_BROKER_ROOT: /var/lib/c2c
      C2C_RELAY_URL: http://relay:7331
      C2C_RELAY_CONNECTOR_BACKEND: http
      C2C_IN_DOCKER: "1"
      C2C_MCP_AUTO_REGISTER_ALIAS: agent-a1
      C2C_MCP_SESSION_ID: agent-a1-session
      C2C_CLI_FORCE: "1"
    command: ["sleep", "3600"]

  agent-a2:
    image: c2c-e2e-agent:latest
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: c2c-e2e-agent-a2
    depends_on:
      relay:
        condition: service_healthy
    volumes:
      - broker-a:/var/lib/c2c
    networks:
      - c2c-e2e-net
    deploy:
      resources:
        limits:
          memory: 96m
          pids: 64
        reservations:
          memory: 32m
    environment:
      C2C_MCP_BROKER_ROOT: /var/lib/c2c
      C2C_RELAY_URL: http://relay:7331
      C2C_RELAY_CONNECTOR_BACKEND: http
      C2C_IN_DOCKER: "1"
      C2C_MCP_AUTO_REGISTER_ALIAS: agent-a2
      C2C_MCP_SESSION_ID: agent-a2-session
      C2C_CLI_FORCE: "1"
    command: ["sleep", "3600"]

  agent-b1:
    image: c2c-e2e-agent:latest
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: c2c-e2e-agent-b1
    depends_on:
      relay:
        condition: service_healthy
    volumes:
      - broker-b:/var/lib/c2c
    networks:
      - c2c-e2e-net
    deploy:
      resources:
        limits:
          memory: 96m
          pids: 64
        reservations:
          memory: 32m
    environment:
      C2C_MCP_BROKER_ROOT: /var/lib/c2c
      C2C_RELAY_URL: http://relay:7331
      C2C_RELAY_CONNECTOR_BACKEND: http
      C2C_IN_DOCKER: "1"
      C2C_MCP_AUTO_REGISTER_ALIAS: agent-b1
      C2C_MCP_SESSION_ID: agent-b1-session
      C2C_CLI_FORCE: "1"
    command: ["sleep", "3600"]

  agent-b2:
    image: c2c-e2e-agent:latest
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: c2c-e2e-agent-b2
    depends_on:
      relay:
        condition: service_healthy
    volumes:
      - broker-b:/var/lib/c2c
    networks:
      - c2c-e2e-net
    deploy:
      resources:
        limits:
          memory: 96m
          pids: 64
        reservations:
          memory: 32m
    environment:
      C2C_MCP_BROKER_ROOT: /var/lib/c2c
      C2C_RELAY_URL: http://relay:7331
      C2C_RELAY_CONNECTOR_BACKEND: http
      C2C_IN_DOCKER: "1"
      C2C_MCP_AUTO_REGISTER_ALIAS: agent-b2
      C2C_MCP_SESSION_ID: agent-b2-session
      C2C_CLI_FORCE: "1"
    command: ["sleep", "3600"]

networks:
  c2c-e2e-net:
    driver: bridge

volumes:
  # Two independent brokers — cross-host delivery must traverse relay.
  broker-a:
  broker-b:
