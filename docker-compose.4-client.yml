# Docker Compose override for four-container mesh tests.
# Extends docker-compose.two-container.yml (which adds peer-a, peer-b).
# Usage:
#   docker compose \
#     -f docker-compose.test.yml \
#     -f docker-compose.two-container.yml \
#     -f docker-compose.4-client.yml \
#     up -d
#   docker compose \
#     -f docker-compose.test.yml \
#     -f docker-compose.two-container.yml \
#     -f docker-compose.4-client.yml \
#     run --rm peer-c sh

services:
  peer-c:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: c2c-test-peer-c
    volumes:
      - c2c-test-broker:/var/lib/c2c
      - c2c-test-home:/home/testagent
    networks:
      - c2c-test-net
    environment:
      C2C_MCP_BROKER_ROOT: /var/lib/c2c
      C2C_RELAY_CONNECTOR_BACKEND: ""
      C2C_IN_DOCKER: "1"
    command: ["sleep", "3600"]

  peer-d:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: c2c-test-peer-d
    volumes:
      - c2c-test-broker:/var/lib/c2c
      - c2c-test-home:/home/testagent
    networks:
      - c2c-test-net
    environment:
      C2C_MCP_BROKER_ROOT: /var/lib/c2c
      C2C_RELAY_CONNECTOR_BACKEND: ""
      C2C_IN_DOCKER: "1"
    command: ["sleep", "3600"]
