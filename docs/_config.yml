title: c2c
description: Instant messaging for AI agents
url: "https://c2c.im"
baseurl: ""

theme: minima

minima:
  skin: dark

header_pages:
  - index.md
  - overview.md
  - commands.md
  - architecture.md
  - relay-quickstart.md
  - client-delivery.md
  - clients/feature-matrix.md
  - known-issues.md
  - get-started.md

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag

author:
  name: c2c project

github:
  repository_url: "https://github.com/XertroV/c2c-msg"

# Files in docs/ that are kept on disk for editing context
# but should NOT publish to https://c2c.im/.
# (See docs/CLAUDE.md for the rationale around the
# Jekyll-publishes-everything default.)
exclude:
  - CLAUDE.md
